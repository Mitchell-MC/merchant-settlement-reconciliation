name: CD

# Enforced deployment order, each a separate job so a failure at any stage
# blocks everything after it: infra validation -> infra apply -> dbt deploy
# -> schedule activation. Schedule activation is gated behind the `release`
# GitHub Environment (configure required reviewers on it in repo settings)
# -- unpausing the daily job is a deliberate human decision, not a side
# effect of merging code.

on:
  push:
    branches: [master]
  workflow_dispatch: {} # allows manually re-running just the activation step

env:
  DATABRICKS_HOST: https://dbc-08add949-9c19.cloud.databricks.com
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  # CD stays wired-but-inert until deployment is DELIBERATELY turned on, via a
  # two-part gate below:
  #   1. the CD_DEPLOY_ENABLED repo variable == "true"  (the explicit switch)
  #   2. the recon-ci-cd service-principal secrets exist (DATABRICKS_CLIENT_ID/
  #      SECRET -- see infra/service_principals.tf)
  # A stored secret alone does NOT start deploying -- same "enabled, not just
  # configured" posture as the Snowflake SNOWFLAKE_DAILY_ENABLED variable. This
  # decoupling exists because deployment is not yet CI-ready: infra/providers.tf
  # pins local CLI profiles (meridian-dev / meridian-account) that don't exist
  # on a runner, so terraform-apply can't auth via the OAuth env creds until
  # that is fixed. Flip CD_DEPLOY_ENABLED to "true" only after that providers.tf
  # env-auth fix is in and verified. Until then every deploy job skips and a
  # push to master shows a green (skipped) CD. (Secrets/vars can't be read in a
  # job-level `if` directly, hence this preflight-output indirection.)
  preflight:
    runs-on: ubuntu-latest
    outputs:
      deploy_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          CD_DEPLOY_ENABLED: ${{ vars.CD_DEPLOY_ENABLED }}
        run: |
          if [ "$CD_DEPLOY_ENABLED" = "true" ] && [ -n "$DATABRICKS_CLIENT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CD skipped -- set the CD_DEPLOY_ENABLED repo variable to 'true' (and the recon-ci-cd secrets) to deploy. Deployment also needs the infra/providers.tf CI-auth fix first -- see this file's header."
          fi

  terraform-apply:
    needs: preflight
    if: needs.preflight.outputs.deploy_enabled == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"
      - run: terraform init
      - run: terraform plan -var-file=environments/dev.tfvars -out=tfplan
      - run: terraform apply -auto-approve tfplan

  dbt-deploy:
    needs: terraform-apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Sync dbt project to the workspace
        run: databricks sync --full transform /Shared/merchant_reconciliation/transform
      - name: Run dbt build once as a deploy-time smoke test
        working-directory: transform
        env:
          DBT_PROFILES_DIR: ../.github/ci
        run: |
          pip install "dbt-databricks>=1.8,<2.0"
          dbt deps
          dbt build

  activate-schedule:
    needs: dbt-deploy
    runs-on: ubuntu-latest
    environment: release # requires a reviewer approval configured on this GitHub Environment
    steps:
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Unpause the daily reconciliation job
        run: |
          databricks jobs update --job-id "$JOB_ID" --json '{"new_settings": {"schedule": {"pause_status": "UNPAUSED"}}}'
        env:
          JOB_ID: "376440490795606"
