name: CD

# Deploy pipeline: sync the dbt project to the workspace + run a build smoke
# test, then activate the daily schedule behind a human approval gate.
#
# Infrastructure (Terraform) is deliberately NOT part of CI/CD. The Terraform
# state is local (no remote backend), so a fresh CI runner has no state to
# apply against -- it would try to recreate resources that already exist.
# Infra changes are therefore a deliberate, local/manual `terraform apply`
# where the state lives; see infra/README.md. Standing up a remote state
# backend (S3 + lock table) is the documented path to automating infra too,
# not implemented here. This keeps CD to the part that genuinely works from a
# runner: dbt deploy (needs only Databricks auth, no state) + schedule
# activation.
#
# activate-schedule is gated behind the `release` GitHub Environment (required
# reviewer) -- unpausing the daily job is a deliberate human decision, not a
# side effect of merging code.

on:
  push:
    branches: [master]
  workflow_dispatch: {} # allows manually re-running the deploy/activation

# Never let two deploys run at once -- a concurrent `dbt build` against the
# same catalog collides on DDL (create table / load seed), which is exactly
# what failed when a push and a manual dispatch overlapped. New runs queue
# behind an in-progress one rather than cancelling it mid-deploy.
concurrency:
  group: cd-deploy
  cancel-in-progress: false

env:
  DATABRICKS_HOST: https://dbc-08add949-9c19.cloud.databricks.com
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  # OAuth M2M (service principal) auth for the CLI + dbt. Deliberately NO
  # DATABRICKS_ACCOUNT_ID here: setting it makes the SDK treat workspace calls
  # as account-scoped and auth fails ("cannot configure default credentials").

jobs:
  # CD stays wired-but-inert until deployment is DELIBERATELY turned on, via a
  # two-part gate:
  #   1. the CD_DEPLOY_ENABLED repo variable == "true"  (the explicit switch)
  #   2. the recon-ci-cd service-principal secrets exist (DATABRICKS_CLIENT_ID/
  #      SECRET -- see infra/service_principals.tf)
  # A stored secret alone does NOT start deploying -- same "enabled, not just
  # configured" posture as the Snowflake SNOWFLAKE_DAILY_ENABLED variable.
  # (Secrets/vars can't be read in a job-level `if` directly, hence this
  # preflight-output indirection.)
  preflight:
    runs-on: ubuntu-latest
    outputs:
      deploy_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          CD_DEPLOY_ENABLED: ${{ vars.CD_DEPLOY_ENABLED }}
        run: |
          if [ "$CD_DEPLOY_ENABLED" = "true" ] && [ -n "$DATABRICKS_CLIENT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CD skipped -- set the CD_DEPLOY_ENABLED repo variable to 'true' (and the recon-ci-cd secrets) to deploy."
          fi

  dbt-deploy:
    needs: preflight
    if: needs.preflight.outputs.deploy_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Sync dbt project to the workspace
        run: databricks sync --full transform /Shared/merchant_reconciliation/transform
      - name: Run dbt build once as a deploy-time smoke test
        working-directory: transform
        env:
          DBT_PROFILES_DIR: ../.github/ci
        run: |
          pip install "dbt-databricks>=1.8,<2.0"
          dbt deps
          # Exclude the dead-man's-switch test -- it's an operational monitor
          # (does the pipeline still run on schedule?), run by its own
          # heartbeat job, not a build-time data-quality check. In a deploy it
          # would fail simply because the paused daily job's last run is stale.
          dbt build --exclude tag:heartbeat

  activate-schedule:
    needs: dbt-deploy
    runs-on: ubuntu-latest
    environment: release # required-reviewer gate configured on this GitHub Environment
    steps:
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Unpause the daily reconciliation job
        run: |
          databricks jobs update --job-id "$JOB_ID" --json '{"new_settings": {"schedule": {"pause_status": "UNPAUSED"}}}'
        env:
          JOB_ID: "376440490795606"
