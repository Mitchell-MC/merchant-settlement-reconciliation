name: CI

# Runs on every PR. Enforces the deployment order from the plan:
# infrastructure validation and transformation/test validation both gate
# merge; schedule activation is a separate, deliberate step in cd.yml, never
# automatic.
#
# Setup required before this can actually run green (see infra/README.md):
#   - Repo secrets DATABRICKS_CLIENT_ID / DATABRICKS_CLIENT_SECRET for the
#     `recon-ci-cd` service principal (application_id
#     3acbec4b-0afd-4c00-b39d-3399d8f1d50f, already created and added to the
#     recon_engineering group -- see infra/service_principals.tf). Generate
#     the secret with `databricks service-principal-secrets create
#     3acbec4b-0afd-4c00-b39d-3399d8f1d50f --profile meridian-account` and
#     add it via `gh secret set`, never commit it.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  DATABRICKS_HOST: https://dbc-08add949-9c19.cloud.databricks.com
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  # Fast gate: lint every push/PR. A linter error blocks merge -- cheap,
  # no secrets, no warehouse. (Terraform is fmt-checked and dbt is parsed in
  # their own jobs below; this closes the Python-side gap.)
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      # Lint gate (undefined names, unused imports, import order, real syntax
      # errors). `ruff format` adoption is intentionally a separate future
      # step -- not folded in here so this change stays reviewable.
      - run: ruff check .

  python-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r data_generation/requirements.txt -r ingestion/requirements.txt -r requirements-dev.txt
      # Coverage is a ratchet, not a vanity number: --cov-fail-under blocks
      # merge if coverage drops below the floor in pyproject.toml, so a PR
      # can't quietly remove tested code. Raise the floor as coverage grows;
      # never lower it to make a red build green.
      - run: pytest tests/ -v --cov --cov-report=term-missing

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  dbt-parse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "dbt-databricks>=1.8,<2.0"
      - run: dbt deps
      # dbt needs a profile to resolve `target.*` even for parse (which never
      # connects). Point at the repo's CI profile via an absolute path -- the
      # default ~/.dbt does not exist on the runner.
      - name: dbt parse # syntax/DAG validation only -- no warehouse connection needed
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/ci
        run: dbt parse

  dbt-build-test:
    needs: [terraform-validate, dbt-parse]
    # Live build against the dev catalog needs the Databricks CI secrets, so
    # run it on PRs (the merge gate) but skip it on direct pushes to master --
    # a push without those secrets would go red on every commit and train
    # everyone to ignore a red CI, which defeats the whole point of the gate.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "dbt-databricks>=1.8,<2.0"
      - run: dbt deps
      - name: dbt build (seeds + models + tests) against the live dev catalog
        env:
          # Absolute path -- a bare ".github/ci" would resolve under the
          # transform working-directory, not the repo root.
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/ci
        run: dbt build
