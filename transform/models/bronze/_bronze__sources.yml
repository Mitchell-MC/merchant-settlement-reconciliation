version: 2

sources:
  - name: bronze
    database: "{{ target.database }}"   # resolves to the Unity Catalog catalog on Databricks, or the Snowflake database on the snowflake target -- both parameterized by infra*/*.tf per environment
    schema: bronze
    description: >
      Raw landed tables from the synthetic operational data generator
      (data_generation/generate.py) and public macro reference sources
      (FRPS, CBP, CPI). Immutable, append-only, carries lineage metadata
      on every row. See docs/non_functional_targets.md for the Bronze
      immutability contract.
    loader: "{{ 'snowflake_copy_into' if target.type == 'snowflake' else 'databricks_copy_into' }}"   # doc-only field; see scripts/load_bronze_to_snowflake.py for the actual Snowflake load mechanism
    # Source-level default freshness applies to the OPERATIONAL tables
    # (merchants/transactions/settlement_batches/reserve_events/
    # returns_adjustments/bank_movements) -- the daily feed whose silence is
    # the "failed for 72 hours" scenario. The slowly-changing macro tables
    # (frps/cbp/cpi) override this below, because their staleness is expected
    # and documented (see docs/non_functional_targets.md "Freshness window")
    # -- flagging them stale on a daily `dbt source freshness` would be pure
    # false-noise, the opposite of what monitoring is for.
    freshness:
      warn_after: {count: 26, period: hour}
      error_after: {count: 50, period: hour}
    loaded_at_field: _ingestion_timestamp

    tables:
      - name: merchants
        description: Merchant dimension, generated once per run (static reference).
        columns:
          - name: merchant_id
            description: Primary key.
            tests: [unique, not_null]
          - name: business_name
          - name: industry
          - name: mcc
          - name: region
          - name: state
          - name: employer_size_class
          - name: risk_tier
          - name: onboarding_date
          - name: reserve_rate_bps
          - name: processing_fee_bps
          - name: settlement_speed_business_days
          - name: avg_ticket_usd
          - name: daily_txn_volume_multiplier

      - name: transactions
        description: Raw transaction-level events (grain -- one row per transaction).
        columns:
          - name: transaction_id
            tests: [unique, not_null]
          - name: merchant_id
            tests:
              - not_null
              - relationships:
                  to: source('bronze', 'merchants')
                  field: merchant_id
          - name: transaction_date
          - name: transaction_timestamp
          - name: transaction_type
            tests:
              - accepted_values:
                  values: ['sale', 'refund']
          - name: channel
            tests:
              - accepted_values:
                  values: ['card_present', 'ecommerce']
          - name: amount

      - name: settlement_batches
        description: >
          Daily per-merchant settlement batch -- the "expected settlement"
          side of the reconciliation. Grain: one row per (merchant_id, batch_date).
        columns:
          - name: settlement_batch_id
            tests: [unique, not_null]
          - name: merchant_id
            tests: [not_null]
          - name: batch_date
            tests: [not_null]
          - name: transaction_count
          - name: gross_sales_volume
          - name: same_day_refunds
          - name: interchange_fees
          - name: network_fees
          - name: processing_fees
          - name: reserve_held
          - name: reserve_released
          - name: returns_adjustments_amount
          - name: expected_settlement_amount
            tests: [not_null]
          - name: expected_payout_date
            tests: [not_null]

      - name: reserve_events
        description: Reserve hold/release ledger events.
        columns:
          - name: merchant_id
            tests: [not_null]
          - name: event_type
            tests:
              - accepted_values:
                  values: ['hold', 'release']
          - name: event_date
          - name: amount
          - name: related_date

      - name: returns_adjustments
        description: Lagged return/chargeback/dispute adjustments applied against a later settlement batch.
        columns:
          - name: adjustment_id
            tests: [unique, not_null]
          - name: merchant_id
            tests: [not_null]
          - name: adjustment_date
          - name: original_batch_date
          - name: amount
          - name: reason_code
            tests:
              - accepted_values:
                  values: ['chargeback', 'customer_return', 'billing_dispute']

      - name: bank_movements
        description: >
          The "actual cash" side of the reconciliation -- raw bank postings.
          Not guaranteed to line up 1:1 with settlement_batches; that's the
          reconciliation engine's job in Silver/Gold.
        columns:
          - name: posting_id
            tests: [unique, not_null]
          - name: merchant_id
            tests: [not_null]
          - name: posting_date
            tests: [not_null]
          - name: amount
            tests: [not_null]
          - name: bank_reference

      - name: frps_payment_volumes
        description: >
          Federal Reserve Payments Study top-line volume/value by payment
          type (see docs/source_contracts/frps.md). Grain: (row_number,
          collection_year) -- payment_type_label repeats across the
          hierarchy, so row_number (not the label) is the real key.
        # Triennial benchmark -- disable freshness; staleness is by design.
        freshness: null
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns: [row_number, collection_year]
        columns:
          - name: row_number
            tests: [not_null]
          - name: collection_year
            tests:
              - not_null
              - accepted_values:
                  values: [2015, 2018, 2021, 2024]
          - name: category_path

      - name: cbp_establishments
        description: >
          County Business Patterns establishment counts by geography/2-digit
          NAICS sector/employer-size (see docs/source_contracts/cbp.md).
          Grain: (state_fips, county_fips, naics_code).
        # Annual Census release -- disable freshness; staleness is by design.
        freshness: null
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns: [state_fips, county_fips, naics_code]
        columns:
          - name: state_fips
            tests: [not_null]
          - name: county_fips
            tests: [not_null]
          - name: naics_code
            tests: [not_null]

      - name: cpi_monthly
        description: >
          BLS Consumer Price Index monthly series, CPI-U all items, NSA and
          SA (see docs/source_contracts/cpi.md). Grain: (series_id, year, period).
        # Monthly BLS release, ~2wk lag -- warn only past 45 days, never
        # error (macro enrichment must not block operational reconciliation),
        # matching docs/non_functional_targets.md.
        freshness:
          warn_after: {count: 45, period: day}
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns: [series_id, year, period]
        columns:
          - name: series_id
            tests:
              - not_null
              - accepted_values:
                  values: ['CUUR0000SA0', 'CUSR0000SA0']
          - name: year
            tests: [not_null]
          - name: period
            tests: [not_null]
          - name: value
            tests: [not_null]

      # fred_rates is deliberately NOT declared here yet. ingestion/fred_ingest.py
      # requires a real FRED_API_KEY (no unauthenticated fallback -- see
      # docs/source_contracts/fred.md), which isn't available in this
      # environment. Adding a dbt source with column tests before the table
      # physically exists in the live bronze schema would break `dbt build`
      # in CI (source tests query the real table). Run fred_ingest.py once
      # against a real key to land the table, THEN add the `fred_rates`
      # source block here (same shape as `cpi_monthly` above) in a follow-up
      # change.
