version: 2

models:
  - name: dim_merchant
    description: Conformed merchant dimension.
    columns:
      - name: merchant_id
        tests: [unique, not_null]

  - name: dim_date
    description: Date spine with US Federal Reserve holiday calendar and business-day sequencing.
    columns:
      - name: date_day
        tests: [unique, not_null]

  - name: dim_payment_channel
    description: Payment channel dimension.

  - name: fct_transaction
    description: Conformed transaction-level fact.
    columns:
      - name: transaction_id
        tests: [unique, not_null]
      - name: merchant_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_merchant')
              field: merchant_id

  - name: fct_settlement_batch
    description: Conformed settlement batch fact -- the "expected settlement" side of reconciliation.
    columns:
      - name: settlement_batch_id
        tests: [unique, not_null]
      - name: expected_settlement_amount
        tests: [not_null]

  - name: fct_bank_movement
    description: Conformed bank posting fact -- the "actual cash" side of reconciliation.
    columns:
      - name: posting_id
        tests: [unique, not_null]

  - name: fct_reserve_event
    description: Conformed reserve hold/release ledger.

  - name: fct_returns_adjustment
    description: Conformed lagged return/chargeback/dispute adjustments.
    columns:
      - name: adjustment_id
        tests: [unique, not_null]

  - name: int_reconciliation_matches
    description: >
      The reconciliation engine's output -- one row per settlement batch,
      with its matched bank posting(s) (if any) and match/break status.
    columns:
      - name: settlement_batch_id
        tests: [unique, not_null]
      - name: is_matched
        tests: [not_null]
