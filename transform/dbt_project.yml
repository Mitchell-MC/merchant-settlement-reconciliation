name: 'merchant_reconciliation'
version: '1.0.0'
config-version: 2

profile: 'merchant_reconciliation'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

on-run-end:
  - "{{ log_run_results(results) }}"

models:
  merchant_reconciliation:
    bronze:
      +materialized: view
      +schema: bronze
    silver:
      +materialized: table
      +schema: silver
    gold:
      +materialized: table
      +schema: gold
      +tags: ["gold"]
    ops:
      +materialized: table
      +schema: ops
      +tags: ["ops"]

vars:
  reconciliation_amount_tolerance_floor_usd: 1.00
  reconciliation_amount_tolerance_pct: 0.001
  reconciliation_date_window_business_days: 2
  cash_at_risk_aging_threshold_business_days: 5
  assumed_cost_of_funds_annual_rate: 0.08
  # Dead-man's-switch threshold: how many hours since the last logged run
  # before the pipeline is considered SILENT (see ops/pipeline_heartbeat.sql
  # and tests/assert_pipeline_not_silent.sql). 26h = the daily cadence plus
  # a 2h grace window, matching the Bronze source freshness warn window in
  # models/bronze/_bronze__sources.yml.
  pipeline_heartbeat_threshold_hours: 26
